services:
  - type: web
    name: karate-competition-manager
    env: python
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    plan: free
    healthCheckPath: /health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "0"
      - key: FLASK_SECRET_KEY
        fromSecret: flask-secret-key
    databases:
      - name: karate-db
        databaseName: karate_competitions
        user: karate_user
        plan: free
    autoDeploy: true

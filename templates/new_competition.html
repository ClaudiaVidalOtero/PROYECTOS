<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear campeonato</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #f5f7fb; color: #111; }
    main { max-width: 600px; margin: 2rem auto; background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 12px rgba(0,0,0,.08); }
    h1 { color: #0b3d91; margin-bottom: 1.5rem; }
    .form-group { margin-bottom: 1rem; }
    label { display: block; font-weight: 500; margin-bottom: 0.5rem; }
    input { width: 100%; padding: 0.6rem; border: 1px solid #c4c7d0; border-radius: 8px; font-size: 1rem; }
    input:focus { outline: none; border-color: #0b3d91; box-shadow: 0 0 0 2px rgba(11, 61, 145, 0.1); }
    .buttons { display: flex; gap: 1rem; margin-top: 2rem; }
    button { padding: 0.9rem 1.4rem; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; }
    .btn-primary { background: #0b3d91; color: white; }
    .btn-primary:hover { background: #0f4ca0; }
    .btn-secondary { background: #ddd; color: #111; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; }
    .btn-secondary:hover { background: #ccc; }
    a { color: #0b3d91; text-decoration: none; }
  </style>
</head>
<body>
  <main>
    <h1>Crear campeonato</h1>
    <form method="post">
      <div class="form-group">
        <label for="name">Nombre del campeonato *</label>
        <input type="text" id="name" name="name" required>
      </div>
      <div class="form-group">
        <label for="event_date">Fecha del torneo *</label>
        <input type="date" id="event_date" name="event_date" required>
      </div>
      <div class="buttons">
        <button type="submit" class="btn-primary">Crear campeonato</button>
        <a href="{{ url_for('index') }}" class="btn-secondary">Cancelar</a>
      </div>
    </form>
  </main>
</body>
</html>

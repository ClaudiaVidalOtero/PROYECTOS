<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Participante - {{ competition.name }}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #f5f7fb; color: #111; font-size: 14px; }
    main { max-width: 600px; margin: 0 auto; padding: 2rem 1.5rem; }
    h1 { color: #0b3d91; margin-bottom: 1rem; font-size: 1.5rem; }
    .form-section { background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 12px rgba(0,0,0,.08); }
    .form-group { margin-bottom: 1rem; }
    label { display: block; font-weight: 500; margin-bottom: 0.3rem; }
    input, select { width: 100%; padding: 0.7rem; border: 1px solid #ddd; border-radius: 8px; }
    .checkbox-group { display: flex; gap: 1rem; }
    button { background: #0b3d91; color: white; padding: 0.7rem 1.2rem; border: none; border-radius: 8px; cursor: pointer; }
    button:hover { background: #0f4ca0; }
    .cancel { background: #6c757d; margin-left: 1rem; }
    .cancel:hover { background: #5a6268; }
  </style>
</head>
<body>
  <main>
    <h1>Editar Participante - {{ competition.name }}</h1>
    
    <div class="form-section">
      <form method="post">
        <div class="form-group">
          <label for="name">Nombre</label>
          <input type="text" id="name" name="name" value="{{ participant.name }}" required>
        </div>
        
        <div class="form-group">
          <label for="birthdate">Fecha de nacimiento</label>
          <input type="date" id="birthdate" name="birthdate" value="{{ participant.birthdate.strftime('%Y-%m-%d') }}" required>
        </div>
        
        <div class="form-group">
          <label for="gender">Género</label>
          <select id="gender" name="gender" required>
            <option value="M" {% if participant.gender == 'M' %}selected{% endif %}>Masculino</option>
            <option value="F" {% if participant.gender == 'F' %}selected{% endif %}>Femenino</option>
            <option value="X" {% if participant.gender == 'X' %}selected{% endif %}>Otro</option>
          </select>
        </div>
        
        <div class="form-group">
          <label for="grade">Grado</label>
          <input type="text" id="grade" name="grade" value="{{ participant.grade or '' }}">
        </div>
        
        <div class="form-group">
          <label for="weight">Peso (kg)</label>
          <input type="number" step="0.1" id="weight" name="weight" value="{{ participant.weight or '' }}">
        </div>
        
        <div class="form-group">
          <label>Participación</label>
          <div class="checkbox-group">
            <label><input type="checkbox" name="kata" {% if participant.kata_participation %}checked{% endif %}> Kata</label>
            <label><input type="checkbox" name="kumite" {% if participant.kumite_participation %}checked{% endif %}> Kumite</label>
          </div>
        </div>
        
        <button type="submit">Guardar cambios</button>
        <a href="{{ url_for('list_participants', comp_id=competition.id) }}"><button type="button" class="cancel">Cancelar</button></a>
      </form>
    </div>
  </main>
</body>
</html>
